name: Build Container Images
on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * 1-5' # Every weekday at 5am UTC

env:
  REGISTRY: ghcr.io
jobs:
  build_scan_push:
    name: Build-Scan-Push
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dockerfile-dir:
          - hmpps-devops-tools
          - hmpps-jdk-debug
          - hmpps-mssql-tools
          - hmpps-mysql-tools
          - hmpps-postgres-tools
          - hmpps-wiremock
          - hmpps-localstack
          - hmpps-clamav
          - hmpps-python-deps
    permissions:
      packages: write
      contents: read
      security-events: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.dockerfile-dir }}
          flavor: |
            latest=true
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=sha
      - name: Log in to GitHub container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build container image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./${{ matrix.dockerfile-dir }}
          pull: true
          push: false
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.dockerfile-dir }}:${{ github.sha }}

      - name: Push container image to repository
        # Only push to repo if on main branch
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./${{ matrix.dockerfile-dir }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true

      - name: Prepare Slack failure summary
        if: ${{ failure() && github.ref == 'refs/heads/main' }}
        run: |
          cat << 'EOF' > slack-results.txt
          Job: ${{ github.job }}
          Status: ${{ job.status }}
          Workflow: ${{ github.workflow }}
          Repo: ${{ github.repository }}
          Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Matrix dockerfile-dir: ${{ matrix.dockerfile-dir }}
          EOF

      - name: Slack notification
        id: slack
        if: ${{ failure() && github.ref == 'refs/heads/main' }}
        uses: ministryofjustice/hmpps-github-shared-actions/.github/actions/slack_failure_results@v1
        with:
          input_file: slack-results.txt
          channel_id: ${{ vars.SLACK_GITHUB_ALERTS }}
          SLACK_BOT_TOKEN: ${{ secrets.HMPPS_SLACK_BOT_TOKEN }}
