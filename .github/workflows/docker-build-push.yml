name: Build Container Images
on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * 1-5' # Every weekday at 5am UTC

env:
  REGISTRY: ghcr.io
jobs:
  build_scan_push:
    name: Build-Scan-Push
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.HMPPS_SNYK_API_KEY }}
    strategy:
      fail-fast: false
      matrix:
        dockerfile-dir:
          - hmpps-devops-tools
          - hmpps-jdk-debug
          - hmpps-mssql-tools
          - hmpps-mysql-tools
          - hmpps-postgres-tools
          - hmpps-wiremock
          - hmpps-localstack
          - hmpps-clamav
          - hmpps-python-deps
    permissions:
      packages: write
      contents: read
      security-events: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.dockerfile-dir }}
          flavor: |
            latest=true
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=sha
      - name: Log in to GitHub container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build container image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./${{ matrix.dockerfile-dir }}
          pull: true
          push: false
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.dockerfile-dir }}:${{ github.sha }}

      - name: Push container image to repository
        # Only push to repo if on main branch
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./${{ matrix.dockerfile-dir }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true

      - name: Prepare Slack failure summary
        if: ${{ failure() && github.ref == 'refs/heads/main' }}
        run: |
          cat << 'EOF' > slack-results.txt
          Job: ${{ github.job }}
          Status: ${{ job.status }}
          Workflow: ${{ github.workflow }}
          Repo: ${{ github.repository }}
          Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Matrix dockerfile-dir: ${{ matrix.dockerfile-dir }}
          EOF

      - name: Slack notification
        id: slack
        if: ${{ failure() && github.ref == 'refs/heads/main' }}
        uses: ministryofjustice/hmpps-github-shared-actions/.github/actions/slack_failure_results@v1
        with:
          input_file: slack-results.txt
          channel_id: ${{ vars.SLACK_GITHUB_ALERTS }}
          SLACK_BOT_TOKEN: ${{ secrets.HMPPS_SLACK_BOT_TOKEN }}

      - name: Run Snyk container scan
        continue-on-error: true
        uses: snyk/actions/docker@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
        with:
          image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.dockerfile-dir }}:${{ github.sha }}
          args: --severity-threshold=high --file=${{ matrix.dockerfile-dir }}/Dockerfile

      - name: Verify Snyk scan execution
        run: |
          if [[ ! -s snyk.sarif ]]; then
            echo "Snyk scan did not complete successfully (missing snyk.sarif)."
            exit 1
          fi

      - name: Prepare SARIF for upload
        if: ${{ hashFiles('snyk.sarif') != '' }}
        run: |
          set -euo pipefail

          jq '
            def severity_from_level($level):
              if $level == "error" then "8.0"
              elif $level == "warning" then "5.0"
              elif $level == "note" then "3.0"
              else "0.0" end;

            def normalize_any_severity($value):
              if $value == null then "0.0"
              elif ($value | type) == "number" then ($value | tostring)
              elif ($value | type) == "string" then
                if ($value | test("^[0-9]+(\\.[0-9]+)?$")) then $value
                elif (($value | ascii_downcase) == "critical") then "9.0"
                elif (($value | ascii_downcase) == "high") then "8.0"
                elif (($value | ascii_downcase) == "medium") then "5.0"
                elif (($value | ascii_downcase) == "low") then "3.0"
                else "0.0" end
              else "0.0" end;

            def normalize_rule:
              .properties = (.properties // {})
              | .defaultConfiguration = (.defaultConfiguration // {})
              | .properties["security-severity"] =
                  (
                    .properties["security-severity"] as $sev
                    | if $sev == null then severity_from_level(.defaultConfiguration.level)
                      else normalize_any_severity($sev)
                      end
                  );

            def fix_security_severity_fields:
              if type == "object" then
                (with_entries(.value |= fix_security_severity_fields)
                 | if has("security-severity") then
                     .["security-severity"] = normalize_any_severity(.["security-severity"])
                   else
                     .
                   end)
              elif type == "array" then
                map(fix_security_severity_fields)
              else
                .
              end;

            .runs |= map(
              .tool = (.tool // {})
              | .tool.driver = (.tool.driver // {})
              | .tool.driver.rules = ((.tool.driver.rules // []) | map(normalize_rule))
              | .tool.extensions = ((.tool.extensions // []) | map(
                  .rules = ((.rules // []) | map(normalize_rule))
                ))
            )
            | fix_security_severity_fields
          ' snyk.sarif > snyk-upload.sarif

      - name: Upload Snyk SARIF
        if: ${{ always() && hashFiles('snyk-upload.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: snyk-upload.sarif
          category: snyk-${{ matrix.dockerfile-dir }}

      - name: Slack notification
        id: snyk_slack_notification
        if: ${{ failure() }}
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c  # v3
        with:
          method: chat.postMessage
          token: ${{ secrets.HMPPS_SRE_SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID }}",
              "text": "Base image build failed for ${{ github.repository }}",
              "attachments": [
                {
                  "color": "danger",
                  "fallback": "${{ matrix.dockerfile-dir }} Image Build Failed - ${{ github.workflow }} in ${{ github.repository }}",
                  "blocks": [
                    {
                      "type": "header",
                      "text": {
                        "type": "plain_text",
                        "text": "🔨 ${{ matrix.dockerfile-dir }} Image Build Failed"
                      }
                    },
                    {
                      "type": "section",
                      "fields": [
                        {
                          "type": "mrkdwn",
                          "text": "*Workflow:*\n${{ github.workflow }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Repository:*\n${{ github.repository }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Branch:*\n${{ github.ref_name }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Tag:*\n${{ github.sha }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Status:*\n${{ job.status }}"
                        }
                      ]
                    },
                    {
                      "type": "actions",
                      "elements": [
                        {
                          "type": "button",
                          "text": {
                            "type": "plain_text",
                            "text": "View Run"
                          },
                          "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                        }
                      ]
                    }
                  ]
                }
              ]
            }