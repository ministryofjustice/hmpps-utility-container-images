name: Build Container Images
on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * 1-5' # Every weekday at 5am UTC

env:
  REGISTRY: ghcr.io
jobs:
  build_scan_push:
    name: Build-Scan-Push
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dockerfile-dir:
          - hmpps-devops-tools
          - hmpps-jdk-debug
          - hmpps-mssql-tools
          - hmpps-mysql-tools
          - hmpps-postgres-tools
          - hmpps-wiremock
          - hmpps-localstack
          - hmpps-clamav
          - hmpps-python-deps
    permissions:
      packages: write
      contents: read
      security-events: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.dockerfile-dir }}
          flavor: |
            latest=true
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=sha
      - name: Log in to GitHub container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build container image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: ./${{ matrix.dockerfile-dir }}
          pull: true
          push: false
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.dockerfile-dir }}:${{ github.sha }}

      - name: Push container image to repository
        # Only push to repo if on main branch
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: ./${{ matrix.dockerfile-dir }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true

      - name: Prepare Slack failure summary
        if: ${{ failure() && github.ref == 'refs/heads/main' }}
        run: |
          cat << 'EOF' > slack-results.txt
          Job: ${{ github.job }}
          Status: ${{ job.status }}
          Workflow: ${{ github.workflow }}
          Repo: ${{ github.repository }}
          Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Matrix dockerfile-dir: ${{ matrix.dockerfile-dir }}
          EOF

      - name: Slack notification
        id: slack
        if: ${{ failure() && github.ref == 'refs/heads/main' }}
        uses: ministryofjustice/hmpps-github-shared-actions/.github/actions/slack_failure_results@v1
        with:
          input_file: slack-results.txt
          channel_id: ${{ vars.SLACK_GITHUB_ALERTS }}
          SLACK_BOT_TOKEN: ${{ secrets.HMPPS_SLACK_BOT_TOKEN }}
